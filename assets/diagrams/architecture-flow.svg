<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6573"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1280" height="880" fill="#f7f8fa"/>

  <!-- Title -->
  <text x="640" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">Lab BigData — Flux de données SIEM</text>
  <text x="640" y="62" text-anchor="middle" font-size="14" fill="#6b7280">Kafka (KRaft) → Normalisation → OpenSearch → Dashboards / Grafana</text>

  <!-- ============ COLUMN 1 : SOURCES ============ -->
  <text x="120" y="100" font-size="14" font-weight="700" fill="#374151">SOURCES</text>

  <!-- Web traffic -->
  <rect x="20" y="115" width="200" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">log/13_live_generator.py</text>
  <text x="120" y="156" text-anchor="middle" font-size="11" fill="#1e3a8a">Trafic web simulé (réel : nginx/access.log)</text>

  <!-- DB simulator -->
  <rect x="20" y="187" width="200" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">db/17_db_simulator.py</text>
  <text x="120" y="228" text-anchor="middle" font-size="11" fill="#1e3a8a">Activité BDD simulée (réel : audit log SQL)</text>

  <!-- Detection web -->
  <rect x="20" y="259" width="200" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">log/11_log_processor.py</text>
  <text x="120" y="300" text-anchor="middle" font-size="11" fill="#1e3a8a">Détection règles web (HIGH_REQUEST_RATE...)</text>

  <!-- Detection DB -->
  <rect x="20" y="331" width="200" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">db/18_db_monitor.py</text>
  <text x="120" y="372" text-anchor="middle" font-size="11" fill="#1e3a8a">Détection règles BDD (TABLE_DUMP...)</text>

  <!-- Wazuh simulator -->
  <rect x="20" y="403" width="200" height="68" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="120" y="424" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">siem/24_wazuh_simulator.py</text>
  <text x="120" y="442" text-anchor="middle" font-size="11" fill="#92400e">SIMULÉ — invente des events</text>
  <text x="120" y="458" text-anchor="middle" font-size="11" fill="#92400e">au format Wazuh (Phase 3)</text>

  <!-- Future Wazuh agent -->
  <rect x="20" y="487" width="200" height="68" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="120" y="508" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7280">Wazuh Agent réel (futur)</text>
  <text x="120" y="526" text-anchor="middle" font-size="11" fill="#6b7280">Phase 5 — collecte réelle :</text>
  <text x="120" y="543" text-anchor="middle" font-size="11" fill="#6b7280">auth.log, FIM, syscalls</text>

  <!-- ============ COLUMN 2 : KAFKA TOPICS ============ -->
  <text x="430" y="100" font-size="14" font-weight="700" fill="#374151">KAFKA (KRaft)</text>

  <rect x="350" y="155" width="180" height="320" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="440" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Topics</text>

  <rect x="365" y="195" width="150" height="34" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="440" y="216" text-anchor="middle" font-size="12" fill="#5b21b6">web-logs</text>

  <rect x="365" y="237" width="150" height="34" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="440" y="258" text-anchor="middle" font-size="12" fill="#5b21b6">security-alerts</text>

  <rect x="365" y="279" width="150" height="34" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="440" y="300" text-anchor="middle" font-size="12" fill="#5b21b6">db-alerts</text>

  <rect x="365" y="321" width="150" height="34" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="440" y="342" text-anchor="middle" font-size="12" fill="#92400e">wazuh-alerts (simulé)</text>

  <rect x="365" y="363" width="150" height="34" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="440" y="384" text-anchor="middle" font-size="12" fill="#5b21b6">corr-alerts</text>

  <rect x="365" y="405" width="150" height="34" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="440" y="426" text-anchor="middle" font-size="12" fill="#5b21b6">log-stats / events*</text>

  <text x="440" y="460" text-anchor="middle" font-size="11" fill="#6b7280">9 topics — visibles dans Kafka UI</text>
  <text x="440" y="476" text-anchor="middle" font-size="11" fill="#6b7280">(http://localhost:8080)</text>

  <!-- ============ COLUMN 3 : PROCESSING / OPENSEARCH ============ -->
  <text x="730" y="100" font-size="14" font-weight="700" fill="#374151">NORMALISATION + STOCKAGE</text>

  <!-- Normalizer -->
  <rect x="650" y="115" width="220" height="64" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="760" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">siem/20_normalizer.py</text>
  <text x="760" y="158" text-anchor="middle" font-size="11" fill="#065f46">Consumer Kafka → schéma commun</text>
  <text x="760" y="174" text-anchor="middle" font-size="11" fill="#065f46">→ POST API REST OpenSearch :9200</text>

  <!-- Correlator -->
  <rect x="650" y="199" width="220" height="64" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="760" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">siem/21_correlator.py</text>
  <text x="760" y="242" text-anchor="middle" font-size="11" fill="#065f46">Requête OpenSearch toutes les 60s</text>
  <text x="760" y="258" text-anchor="middle" font-size="11" fill="#065f46">→ règles cross-sources → corr-alerts</text>

  <!-- Corr consumer -->
  <rect x="650" y="283" width="220" height="50" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="760" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">siem/22_corr_consumer.py</text>
  <text x="760" y="322" text-anchor="middle" font-size="11" fill="#065f46">Console investigation (chaîne de preuves)</text>

  <!-- OpenSearch -->
  <rect x="650" y="365" width="220" height="80" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="760" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">OpenSearch :9200</text>
  <text x="760" y="412" text-anchor="middle" font-size="11" fill="#9a3412">index siem-events-YYYY.MM.DD</text>
  <text x="760" y="428" text-anchor="middle" font-size="11" fill="#9a3412">+ corr-alerts (API REST)</text>

  <!-- ============ COLUMN 4 : VISUALIZATION ============ -->
  <text x="1080" y="100" font-size="14" font-weight="700" fill="#374151">VISUALISATION</text>

  <!-- OpenSearch Dashboards -->
  <rect x="1000" y="115" width="230" height="80" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="1115" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">OpenSearch Dashboards :5601</text>
  <text x="1115" y="162" text-anchor="middle" font-size="11" fill="#3730a3">Discover — investigation SOC</text>
  <text x="1115" y="178" text-anchor="middle" font-size="11" fill="#3730a3">lit OpenSearch via API REST interne</text>

  <!-- 25_setup_dashboards.sh -->
  <rect x="1000" y="207" width="230" height="56" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="1115" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">siem/25_setup_dashboards.sh</text>
  <text x="1115" y="248" text-anchor="middle" font-size="11" fill="#374151">configure les index patterns (1x au démarrage)</text>

  <!-- Grafana -->
  <rect x="1000" y="365" width="230" height="80" rx="10" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="1115" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#9d174d">Grafana :3000</text>
  <text x="1115" y="412" text-anchor="middle" font-size="11" fill="#9d174d">Monitoring infra (Prometheus)</text>
  <text x="1115" y="428" text-anchor="middle" font-size="11" fill="#9d174d">lag, débit, offsets — dashboards Kafka/SOC/DLP</text>

  <!-- Prometheus -->
  <rect x="1000" y="283" width="230" height="50" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1115" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#9d174d">Prometheus :9090</text>
  <text x="1115" y="322" text-anchor="middle" font-size="11" fill="#9d174d">scrape JMX exporter + kafka exporter</text>

  <!-- ============ ARROWS : sources -> kafka ============ -->
  <path d="M220,143 L350,205" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M220,215 L350,290" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M220,287 L350,250" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M220,359 L350,310" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M220,437 L350,338" fill="none" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <path d="M220,521 L220,560 Q220,575 235,575 L335,575" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <text x="280" y="595" text-anchor="middle" font-size="10" fill="#6b7280">remplacerait le simulateur</text>

  <!-- ============ ARROWS : kafka -> normalizer/correlator ============ -->
  <path d="M530,212 L650,147" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M530,254 L650,147" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M530,296 L650,160" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M530,338 L650,165" fill="none" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrow-orange)"/>

  <!-- correlator <-> opensearch (bidirectional via REST) -->
  <path d="M760,263 L760,365" fill="none" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arrow-purple)"/>
  <text x="775" y="345" font-size="10" fill="#7c3aed">requête OpenSearch</text>

  <!-- normalizer -> opensearch -->
  <path d="M790,179 L800,365" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="815" y="270" font-size="10" fill="#9a3412">POST /_doc</text>
  <text x="815" y="283" font-size="10" fill="#9a3412">(API REST :9200)</text>

  <!-- correlator -> corr-alerts topic -->
  <path d="M650,231 L530,387" fill="none" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrow-purple)"/>

  <!-- corr-alerts -> corr_consumer -->
  <path d="M530,387 L650,308" fill="none" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ============ ARROWS : opensearch -> dashboards / setup ============ -->
  <path d="M870,395 Q940,300 1000,250" fill="none" stroke="#4f46e5" stroke-width="1.8" marker-end="url(#arrow-purple)"/>
  <text x="895" y="320" font-size="10" fill="#3730a3" transform="rotate(-32 895 320)">API REST :9200</text>

  <path d="M870,400 Q940,330 1000,165" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="945" y="280" font-size="10" fill="#3730a3" transform="rotate(-50 945 280)">Discover lit en direct</text>

  <!-- setup_dashboards -> dashboards (config saved objects) -->
  <path d="M1115,207 L1115,195" fill="none" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="1130" y="203" font-size="10" fill="#374151">API REST :5601</text>

  <!-- prometheus -> grafana -->
  <path d="M1115,333 L1115,365" fill="none" stroke="#db2777" stroke-width="1.6" marker-end="url(#arrow-purple)"/>

  <!-- jmx/kafka exporters -> prometheus (from kafka box) -->
  <path d="M530,400 Q800,400 1000,308" fill="none" stroke="#db2777" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-purple)"/>
  <text x="760" y="455" text-anchor="middle" font-size="10" fill="#9d174d">métriques JMX (lag, débit, offsets) — non détaillé ici</text>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(20,620)">
    <rect x="0" y="0" width="1240" height="240" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="20" y="30" font-size="15" font-weight="700" fill="#1f2937">Légende</text>

    <!-- Real data flow -->
    <rect x="20" y="48" width="26" height="26" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="56" y="66" font-size="12" fill="#1f2937">Source / traitement réel — données générées et traitées par du vrai code Python</text>

    <!-- Kafka -->
    <rect x="20" y="84" width="26" height="26" rx="5" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="56" y="102" font-size="12" fill="#1f2937">Kafka (KRaft) — bus d'événements central, tout transite par des topics</text>

    <!-- normalizer/processing -->
    <rect x="20" y="120" width="26" height="26" rx="5" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="56" y="138" font-size="12" fill="#1f2937">Pipeline SIEM — normalisation, corrélation, console investigation (siem/)</text>

    <!-- opensearch -->
    <rect x="20" y="156" width="26" height="26" rx="5" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="56" y="174" font-size="12" fill="#1f2937">OpenSearch — stockage indexé, exposé via API REST :9200</text>

    <!-- dashboards/grafana -->
    <rect x="20" y="192" width="26" height="26" rx="5" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="56" y="210" font-size="12" fill="#1f2937">Visualisation — OpenSearch Dashboards (investigation SOC) / Grafana (monitoring infra)</text>

    <!-- Simulated -->
    <rect x="640" y="48" width="26" height="26" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="676" y="66" font-size="12" fill="#1f2937">SIMULÉ (Phase 3) — events Wazuh générés artificiellement, format réel mais source creuse</text>

    <!-- Future -->
    <rect x="640" y="84" width="26" height="26" rx="5" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="676" y="102" font-size="12" fill="#1f2937">Composant futur — non déployé (Phase 5 : agent Wazuh réel sur VM)</text>

    <!-- arrows -->
    <line x1="640" y1="132" x2="690" y2="132" stroke="#5b6573" stroke-width="1.6" marker-end="url(#arrow)"/>
    <text x="700" y="137" font-size="12" fill="#1f2937">Flux Kafka (producer/consumer)</text>

    <line x1="640" y1="160" x2="690" y2="160" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="700" y="165" font-size="12" fill="#1f2937">Écriture via API REST OpenSearch (POST /_doc)</text>

    <line x1="640" y1="188" x2="690" y2="188" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arrow-purple)"/>
    <text x="700" y="193" font-size="12" fill="#1f2937">Lecture/requête via API REST (corrélation, Discover)</text>

    <text x="20" y="226" font-size="11" fill="#6b7280" font-style="italic">Roadmap : Phase 0 socle Kafka · Phase 1 schéma commun + OpenSearch · Phase 2 corrélation · Phase 3 Wazuh (simulé) · Phase 4 console SOC unifiée · Phase 5 collecte réelle + gouvernance</text>
  </g>
</svg>
